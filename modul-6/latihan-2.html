<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latihan 2 - Keranjang Belanja</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, sans-serif;
      font-size: 16px;
      color: #1f2937;
      background: #eef2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 24px;
    }

    .heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .heading h1 {
      margin: 0;
      font-size: clamp(1.8rem, 2.4vw, 2.4rem);
      letter-spacing: -0.03em;
    }

    .heading p {
      margin: 0;
      color: #475569;
      max-width: 700px;
      line-height: 1.5;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 24px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      border-radius: 20px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
    }

    .card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 18px;
      display: grid;
      gap: 10px;
      flex: 1;
    }

    .card-title {
      font-size: 1.1rem;
      margin: 0;
      font-weight: 700;
      color: #111827;
    }

    .card-price {
      margin: 0;
      color: #0f766e;
      font-weight: 700;
    }

    .card-actions {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .button,
    .icon-button {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .button {
      background: #2563eb;
      color: white;
      padding: 0.8rem 1rem;
      flex: 1;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.18);
    }

    .cart-panel {
      position: sticky;
      top: 24px;
      align-self: start;
      background: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
      display: grid;
      gap: 18px;
    }

    .cart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .cart-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .badge {
      display: inline-flex;
      min-width: 2.2rem;
      padding: 0.5rem 0.7rem;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-weight: 700;
      justify-content: center;
    }

    .cart-list {
      display: grid;
      gap: 16px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .item-info {
      display: grid;
      gap: 4px;
    }

    .item-info strong {
      font-size: 0.98rem;
    }

    .item-subtitle {
      color: #475569;
      font-size: 0.95rem;
    }

    .item-actions {
      display: grid;
      gap: 10px;
      justify-items: end;
      min-width: 108px;
    }

    .qty-controls {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      background: white;
      border: 1px solid #cbd5e1;
      padding: 4px;
    }

    .icon-button {
      width: 34px;
      height: 34px;
      background: #e2e8f0;
      color: #0f172a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .icon-button:hover {
      background: #cbd5e1;
    }

    .remove-button {
      background: transparent;
      color: #ef4444;
      padding: 0;
      min-height: 0;
      font-size: 0.95rem;
    }

    .summary {
      display: grid;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #475569;
    }

    .summary-row.total {
      font-weight: 700;
      color: #111827;
    }

    .checkout {
      width: 100%;
      padding: 0.95rem 1rem;
      border-radius: 14px;
      border: none;
      background: #10b981;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .checkout:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .empty-state {
      color: #64748b;
      padding: 18px 16px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      text-align: center;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .cart-panel {
        position: relative;
        top: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="heading">
      <div>
        <h1>Keranjang Belanja</h1>
        <p>Tambahkan produk ke keranjang, ubah jumlah, dan lihat ringkasan pesanan secara langsung.</p>
      </div>
      <div class="badge" id="iconBadge">0 item</div>
    </section>

    <div class="layout">
      <section>
        <div class="product-grid" id="productGrid" aria-live="polite"></div>
      </section>

      <aside class="cart-panel" aria-label="Ringkasan keranjang belanja">
        <div class="cart-header">
          <div>
            <h2>Keranjang Anda</h2>
            <p id="cartStatus">Belum ada produk dalam keranjang.</p>
          </div>
          <div class="badge" id="cartCount">0</div>
        </div>

        <ul class="cart-list" id="cartList"></ul>

        <div class="summary">
          <div class="summary-row">
            <span>Total item</span>
            <span id="summaryItems">0</span>
          </div>
          <div class="summary-row total">
            <span>Harga total</span>
            <span id="summaryTotal">Rp 0</span>
          </div>
        </div>

        <button class="checkout" id="checkoutButton" type="button">Checkout</button>
      </aside>
    </div>
  </main>
  <script src="latihan-2.js"></script>
</body>
</html>
